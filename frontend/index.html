<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smaartbrand Auto | Maruti POC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; }
    .typing-dot { animation: typing 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
    .markdown-content p { margin-bottom: 0.5rem; }
    .markdown-content ul { margin-left: 1.25rem; }
    .markdown-content strong { font-weight: 600; }
    .markdown-content table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.75rem; }
    .markdown-content th, .markdown-content td { border: 1px solid #e5e7eb; padding: 0.25rem 0.5rem; text-align: left; }
    .markdown-content th { background: #f9fafb; font-weight: 600; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // Follow-up question generator based on query context
    const getFollowUpQuestions = (query, response) => {
      const q = query.toLowerCase();
      const r = response.toLowerCase();
      
      // Context-aware follow-ups
      if (q.includes('safety') || r.includes('safety')) {
        return [
          "How do I beat Creta on safety?",
          "Which Maruti model is safest?",
          "Safety sentiment by gender"
        ];
      }
      if (q.includes('creta') || r.includes('creta')) {
        return [
          "Creta's top weaknesses",
          "Compare Grand Vitara vs Creta",
          "Target Creta considerers"
        ];
      }
      if (q.includes('city') || r.includes('honda city')) {
        return [
          "Why do City owners complain?",
          "Ciaz vs City comparison",
          "Target City owners with?"
        ];
      }
      if (q.includes('grand vitara') || r.includes('grand vitara')) {
        return [
          "Grand Vitara weaknesses",
          "Compare with Nexon",
          "Marketing messaging for GV"
        ];
      }
      if (q.includes('build') || q.includes('new car') || q.includes('r&d')) {
        return [
          "What features should it have?",
          "Which segment to target?",
          "Competitor gaps to exploit"
        ];
      }
      if (q.includes('mileage') || q.includes('efficiency')) {
        return [
          "Fronx efficiency insights",
          "City mileage complaints",
          "Hybrid sentiment analysis"
        ];
      }
      if (q.includes('conquest') || q.includes('opportunity')) {
        return [
          "How to beat Creta?",
          "Target Honda City owners",
          "Mahindra weaknesses"
        ];
      }
      
      // Default follow-ups
      return [
        "What should Maruti build next?",
        "Top conquest opportunities",
        "Brand perception comparison"
      ];
    };

    // Chart.js Bar Chart Component
    const BarChartComponent = ({ data, title }) => {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (chartRef.current) {
          chartRef.current.destroy();
        }

        const ctx = canvasRef.current.getContext('2d');
        chartRef.current = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: data.map(d => d.model),
            datasets: [{
              label: 'Overall Score',
              data: data.map(d => d.overall),
              backgroundColor: data.map(d => 
                d.overall >= 70 ? '#10b981' : d.overall >= 50 ? '#f59e0b' : '#ef4444'
              ),
              borderRadius: 4,
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              title: { display: false }
            },
            scales: {
              x: { 
                beginAtZero: true, 
                max: 100,
                grid: { color: '#f3f4f6' }
              },
              y: {
                grid: { display: false }
              }
            }
          }
        });

        return () => {
          if (chartRef.current) {
            chartRef.current.destroy();
          }
        };
      }, [data]);

      return <canvas ref={canvasRef} />;
    };

    // Dashboard data
    const executiveData = [
      { model: 'Grand Vitara', brand: 'Maruti', safety: 96, mileage: 85, tech: 85, overall: 92 },
      { model: 'Nexon', brand: 'Tata', safety: 85, mileage: 82, tech: 57, overall: 88 },
      { model: 'Brezza', brand: 'Maruti', safety: 88, mileage: 75, tech: 72, overall: 81 },
      { model: 'Fronx', brand: 'Maruti', safety: 65, mileage: 88, tech: 70, overall: 74 },
      { model: 'Creta', brand: 'Hyundai', safety: 14, mileage: 81, tech: 81, overall: 51 },
      { model: 'City', brand: 'Honda', safety: 72, mileage: 3, tech: 78, overall: 48 },
    ].sort((a, b) => b.overall - a.overall);

    const brandHeatmap = [
      { brand: 'Maruti', safety: 100, mileage: 100, tech: 80 },
      { brand: 'Hyundai', safety: 60, mileage: 40, tech: 100 },
      { brand: 'Tata', safety: 40, mileage: 80, tech: 20 },
      { brand: 'Honda', safety: 80, mileage: 60, tech: 60 },
    ];

    // Dashboard View
    const DashboardView = () => (
      <div className="space-y-6 p-4 md:p-6">
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div className="bg-white rounded-xl p-4 border shadow-sm">
            <div className="text-2xl mb-1">📊</div>
            <p className="text-xl font-bold text-gray-900">82%</p>
            <p className="text-sm text-gray-600">Maruti Score</p>
          </div>
          <div className="bg-white rounded-xl p-4 border shadow-sm">
            <div className="text-2xl mb-1">🛡️</div>
            <p className="text-xl font-bold text-green-600">96%</p>
            <p className="text-sm text-gray-600">Grand Vitara Safety</p>
          </div>
          <div className="bg-white rounded-xl p-4 border shadow-sm">
            <div className="text-2xl mb-1">⛽</div>
            <p className="text-xl font-bold text-blue-600">88%</p>
            <p className="text-sm text-gray-600">Fronx Efficiency</p>
          </div>
          <div className="bg-white rounded-xl p-4 border shadow-sm">
            <div className="text-2xl mb-1">⚠️</div>
            <p className="text-xl font-bold text-red-600">14%</p>
            <p className="text-sm text-gray-600">Creta Safety Gap</p>
          </div>
        </div>
        
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div className="bg-white rounded-xl p-5 border shadow-sm">
            <h3 className="font-semibold text-gray-800 mb-4">Overall Satisfaction Ranking</h3>
            <div style={{ height: '280px' }}>
              <BarChartComponent data={executiveData} />
            </div>
          </div>
          
          <div className="bg-white rounded-xl p-5 border shadow-sm">
            <h3 className="font-semibold text-gray-800 mb-4">Brand Sentiment Heatmap</h3>
            <div className="space-y-3">
              {brandHeatmap.map((brand) => (
                <div key={brand.brand} className="flex items-center gap-3">
                  <div className="w-20 text-sm font-medium">{brand.brand}</div>
                  <div className="flex-1 flex gap-1">
                    <div className="h-8 flex-1 rounded flex items-center justify-center text-xs font-bold" 
                      style={{ backgroundColor: `rgba(16, 185, 129, ${brand.safety / 100})`, color: brand.safety > 50 ? 'white' : '#374151' }}>
                      {brand.safety}
                    </div>
                    <div className="h-8 flex-1 rounded flex items-center justify-center text-xs font-bold" 
                      style={{ backgroundColor: `rgba(59, 130, 246, ${brand.mileage / 100})`, color: brand.mileage > 50 ? 'white' : '#374151' }}>
                      {brand.mileage}
                    </div>
                    <div className="h-8 flex-1 rounded flex items-center justify-center text-xs font-bold" 
                      style={{ backgroundColor: `rgba(168, 85, 247, ${brand.tech / 100})`, color: brand.tech > 50 ? 'white' : '#374151' }}>
                      {brand.tech}
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div className="flex justify-center gap-6 mt-4 pt-3 border-t text-xs text-gray-600">
              <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-green-500"></span> Safety</span>
              <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-blue-500"></span> Mileage</span>
              <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-purple-500"></span> Tech</span>
            </div>
          </div>
        </div>
        
        <div className="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-xl p-6 text-white">
          <h3 className="font-semibold mb-4">🎯 Key Strategic Insights</h3>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div className="bg-white/10 rounded-lg p-4">
              <div className="text-2xl mb-2">🛡️</div>
              <p className="font-semibold text-sm">Safety: Maruti Leads</p>
              <p className="text-xs text-white/80 mt-1">Grand Vitara 96% vs Creta 14%</p>
            </div>
            <div className="bg-white/10 rounded-lg p-4">
              <div className="text-2xl mb-2">🎯</div>
              <p className="font-semibold text-sm">Honda City Opportunity</p>
              <p className="text-xs text-white/80 mt-1">3% mileage - target with Ciaz Hybrid</p>
            </div>
            <div className="bg-white/10 rounded-lg p-4">
              <div className="text-2xl mb-2">💻</div>
              <p className="font-semibold text-sm">Tech Gap Neutralized</p>
              <p className="text-xs text-white/80 mt-1">Zero difference with Hyundai now</p>
            </div>
          </div>
        </div>
      </div>
    );

    // Chat View
    const ChatView = () => {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [aiStatus, setAiStatus] = useState({ checked: false, enabled: false, models: 0 });
      const [lastQuery, setLastQuery] = useState('');
      const messagesEndRef = useRef(null);

      useEffect(() => {
        fetch('/api/health')
          .then(r => r.json())
          .then(data => {
            setAiStatus({ checked: true, enabled: data.ai_enabled, models: data.models_loaded || 27 });
            setMessages([{
              role: 'assistant',
              content: `👋 **Welcome to Smaartbrand Auto AI**

I've analyzed **${data.models_loaded || 27} car models** from Reddit r/CarsIndia.

${data.ai_enabled ? '🟢 **AI is ACTIVE** - Full AI responses enabled!' : '🟡 **Rule-based mode** - Add ANTHROPIC_API_KEY in Railway for full AI'}

**Try asking:** • "How do I beat Creta?" • "Tell me about Grand Vitara" • "Safety sentiment analysis" • "Conquest opportunities"`,
              isMarkdown: true,
              showFollowUps: false
            }]);
          })
          .catch(() => {
            setAiStatus({ checked: true, enabled: false, models: 0 });
            setMessages([{ role: 'assistant', content: '👋 Welcome! Ask me about Maruti or competitors.', isMarkdown: false }]);
          });
      }, []);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const handleSend = async (overrideInput) => {
        const query = overrideInput || input;
        if (!query.trim()) return;

        setLastQuery(query);
        setMessages(prev => [...prev, { role: 'user', content: query }]);
        setInput('');
        setIsTyping(true);

        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query })
          });
          const data = await response.json();
          setMessages(prev => [...prev, {
            role: 'assistant',
            content: data.response,
            isMarkdown: true,
            aiPowered: data.ai_powered,
            showFollowUps: true,
            followUps: getFollowUpQuestions(query, data.response)
          }]);
        } catch (error) {
          setMessages(prev => [...prev, {
            role: 'assistant',
            content: '❌ Error connecting to server. Please try again.',
            isMarkdown: false
          }]);
        }
        setIsTyping(false);
      };

      const suggestedQueries = ["How do I beat Creta?", "Tell me about Grand Vitara", "Safety analysis", "Conquest opportunities"];

      return (
        <div className="flex flex-col h-[calc(100vh-64px)]">
          {aiStatus.checked && (
            <div className={`px-4 py-2 text-center text-sm ${aiStatus.enabled ? 'bg-green-50 text-green-700' : 'bg-amber-50 text-amber-700'}`}>
              {aiStatus.enabled ? `🟢 AI Active • ${aiStatus.models} models loaded` : `🟡 Rule-based Mode • ${aiStatus.models} models • Add ANTHROPIC_API_KEY for AI`}
            </div>
          )}

          <div className="flex-1 overflow-y-auto p-4 space-y-4">
            {messages.map((msg, i) => (
              <div key={i} className={`flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                <div className={`max-w-2xl rounded-2xl px-4 py-3 ${msg.role === 'user' ? 'bg-blue-600 text-white' : 'bg-white shadow border'}`}>
                  {msg.role === 'assistant' && (
                    <div className="flex items-center gap-2 mb-2 pb-2 border-b border-gray-100">
                      <span className="text-lg">🚗</span>
                      <span className="text-xs font-medium text-gray-500">DeciPro AI</span>
                    </div>
                  )}
                  {msg.role === 'user' ? (
                    <p className="text-sm">{msg.content}</p>
                  ) : msg.isMarkdown ? (
                    <div className="markdown-content text-sm text-gray-700" dangerouslySetInnerHTML={{ __html: marked.parse(msg.content) }} />
                  ) : (
                    <p className="text-sm text-gray-700">{msg.content}</p>
                  )}
                </div>
                
                {/* Follow-up questions */}
                {msg.role === 'assistant' && msg.showFollowUps && msg.followUps && i === messages.length - 1 && !isTyping && (
                  <div className="mt-3 flex flex-wrap gap-2 max-w-2xl">
                    {msg.followUps.map((followUp, j) => (
                      <button
                        key={j}
                        onClick={() => handleSend(followUp)}
                        className="px-3 py-1.5 bg-gray-100 hover:bg-blue-50 hover:text-blue-700 text-gray-600 text-xs rounded-full transition-colors border border-gray-200 hover:border-blue-200"
                      >
                        {followUp}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            ))}
            {isTyping && (
              <div className="flex justify-start">
                <div className="bg-white rounded-2xl px-4 py-3 shadow border flex items-center gap-3">
                  <div className="flex gap-1">
                    <div className="w-2 h-2 bg-blue-500 rounded-full typing-dot"></div>
                    <div className="w-2 h-2 bg-blue-500 rounded-full typing-dot"></div>
                    <div className="w-2 h-2 bg-blue-500 rounded-full typing-dot"></div>
                  </div>
                  <span className="text-sm text-gray-500">Analyzing sentiment data...</span>
                </div>
              </div>
            )}
            <div ref={messagesEndRef} />
          </div>

          {messages.length <= 1 && (
            <div className="px-4 pb-3">
              <div className="flex flex-wrap gap-2 justify-center">
                {suggestedQueries.map((q, i) => (
                  <button key={i} onClick={() => handleSend(q)} className="px-3 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 text-sm rounded-full transition-colors">
                    {q}
                  </button>
                ))}
              </div>
            </div>
          )}

          <div className="border-t bg-white p-4">
            <div className="flex gap-3 max-w-4xl mx-auto">
              <input
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyPress={(e) => e.key === 'Enter' && !isTyping && handleSend()}
                placeholder="Ask about any model, brand, or aspect..."
                className="flex-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                disabled={isTyping}
              />
              <button
                onClick={() => handleSend()}
                disabled={!input.trim() || isTyping}
                className="px-5 py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white rounded-xl transition-colors"
              >
                Send
              </button>
            </div>
          </div>
        </div>
      );
    };

    // Main App
    function App() {
      const [activeView, setActiveView] = useState('chat');

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50">
          <div className="bg-white border-b shadow-sm px-4 py-3">
            <div className="max-w-7xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-4">
                <img src="/static/acquink_logo.png" alt="Acquink" className="h-7 hidden sm:block" />
                <div className="h-6 w-px bg-gray-300 hidden sm:block"></div>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-xl">
                    🚗
                  </div>
                  <div>
                    <h1 className="text-lg font-bold text-gray-900">Smaartbrand Auto</h1>
                    <p className="text-xs text-gray-500 hidden sm:block">DeciPro DECIDE Engine • Maruti POC</p>
                  </div>
                </div>
              </div>

              <div className="flex items-center gap-2">
                <button
                  onClick={() => setActiveView('dashboard')}
                  className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeView === 'dashboard' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                >
                  📊 <span className="hidden sm:inline">Dashboard</span>
                </button>
                <button
                  onClick={() => setActiveView('chat')}
                  className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeView === 'chat' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                >
                  💬 <span className="hidden sm:inline">AI Chat</span>
                </button>
              </div>

              <div className="text-right text-xs text-gray-500 hidden md:block">
                <p>Reddit r/CarsIndia</p>
                <p className="font-medium">5,000 reviews • 27 models</p>
              </div>
            </div>
          </div>

          <div className="max-w-7xl mx-auto">
            {activeView === 'dashboard' ? <DashboardView /> : <ChatView />}
          </div>

          {/* Footer */}
          <div className="border-t bg-white mt-8 py-4 px-4">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3">
              <div className="flex items-center gap-2">
                <img src="/static/acquink_logo.png" alt="Acquink" className="h-6" />
              </div>
              <p className="text-xs text-gray-500">Copyright © Acquink | All rights reserved 2026</p>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
