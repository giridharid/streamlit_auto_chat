<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smaartbrand Auto | Maruti POC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.5.0/umd/Recharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; margin: 0; }
    .typing-dot { animation: typing 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
    .markdown-content p { margin-bottom: 0.5rem; }
    .markdown-content ul { margin-left: 1.25rem; margin-bottom: 0.5rem; }
    .markdown-content li { margin-bottom: 0.25rem; }
    .markdown-content strong { font-weight: 600; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = window.Recharts;

    // Icons
    const Icon = ({ name, className = "w-5 h-5" }) => {
      const icons = {
        car: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0zM13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0" /></svg>,
        shield: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
        fuel: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
        cpu: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" /></svg>,
        send: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>,
        chart: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
        message: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>,
        dashboard: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z" /></svg>,
        alert: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
        bot: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>,
      };
      return icons[name] || null;
    };

    // Dashboard data
    const executiveData = [
      { model: 'Grand Vitara', brand: 'Maruti', safety: 96, mileage: 85, tech: 85, overall: 92 },
      { model: 'Brezza', brand: 'Maruti', safety: 88, mileage: 75, tech: 72, overall: 81 },
      { model: 'Fronx', brand: 'Maruti', safety: 65, mileage: 88, tech: 70, overall: 74 },
      { model: 'Nexon', brand: 'Tata', safety: 85, mileage: 82, tech: 57, overall: 88 },
      { model: 'Creta', brand: 'Hyundai', safety: 14, mileage: 81, tech: 81, overall: 51 },
      { model: 'City', brand: 'Honda', safety: 72, mileage: 3, tech: 78, overall: 48 },
    ];

    const brandHeatmap = [
      { brand: 'Maruti', safety: 100, mileage: 100, tech: 80 },
      { brand: 'Hyundai', safety: 60, mileage: 40, tech: 100 },
      { brand: 'Tata', safety: 40, mileage: 80, tech: 20 },
      { brand: 'Honda', safety: 80, mileage: 60, tech: 60 },
    ];

    // Dashboard View
    const DashboardView = () => (
      <div className="space-y-6 p-6">
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {[
            { icon: 'chart', title: 'Maruti Score', value: '82%', sub: 'Average', bg: 'bg-blue-50', color: 'text-blue-600' },
            { icon: 'shield', title: 'Safety Leader', value: 'Grand Vitara', sub: '96%', bg: 'bg-green-50', color: 'text-green-600' },
            { icon: 'fuel', title: 'Efficiency Leader', value: 'Fronx', sub: '88%', bg: 'bg-amber-50', color: 'text-amber-600' },
            { icon: 'alert', title: 'Competitor Gap', value: 'Creta Safety', sub: '14%', bg: 'bg-red-50', color: 'text-red-600' }
          ].map(({ icon, title, value, sub, bg, color }) => (
            <div key={title} className="bg-white rounded-xl p-4 border shadow-sm">
              <div className={`p-2 rounded-lg ${bg} w-fit mb-2`}>
                <Icon name={icon} className={`w-4 h-4 ${color}`} />
              </div>
              <p className="text-xl font-bold text-gray-900">{value}</p>
              <p className="text-sm text-gray-600">{title}</p>
              <p className="text-xs text-gray-400">{sub}</p>
            </div>
          ))}
        </div>
        
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div className="bg-white rounded-xl p-5 border shadow-sm">
            <h3 className="font-semibold text-gray-800 mb-4">Overall Satisfaction Ranking</h3>
            <ResponsiveContainer width="100%" height={250}>
              <BarChart data={[...executiveData].sort((a, b) => b.overall - a.overall)} layout="vertical">
                <CartesianGrid strokeDasharray="3 3" />
                <XAxis type="number" domain={[0, 100]} />
                <YAxis type="category" dataKey="model" width={90} tick={{ fontSize: 11 }} />
                <Tooltip />
                <Bar dataKey="overall" radius={[0, 4, 4, 0]}>
                  {executiveData.map((entry, i) => (
                    <Cell key={i} fill={entry.overall >= 70 ? '#10b981' : entry.overall >= 50 ? '#f59e0b' : '#ef4444'} />
                  ))}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
          
          <div className="bg-white rounded-xl p-5 border shadow-sm">
            <h3 className="font-semibold text-gray-800 mb-4">Brand Associations</h3>
            <div className="space-y-3">
              {brandHeatmap.map((brand) => (
                <div key={brand.brand} className="flex items-center gap-3">
                  <div className="w-16 text-sm font-medium">{brand.brand}</div>
                  <div className="flex-1 flex gap-1">
                    <div className="h-7 flex-1 rounded flex items-center justify-center text-xs font-bold" style={{ backgroundColor: `rgba(16, 185, 129, ${brand.safety / 100})`, color: brand.safety > 50 ? 'white' : '#374151' }}>{brand.safety}</div>
                    <div className="h-7 flex-1 rounded flex items-center justify-center text-xs font-bold" style={{ backgroundColor: `rgba(59, 130, 246, ${brand.mileage / 100})`, color: brand.mileage > 50 ? 'white' : '#374151' }}>{brand.mileage}</div>
                    <div className="h-7 flex-1 rounded flex items-center justify-center text-xs font-bold" style={{ backgroundColor: `rgba(168, 85, 247, ${brand.tech / 100})`, color: brand.tech > 50 ? 'white' : '#374151' }}>{brand.tech}</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="flex justify-center gap-4 mt-4 pt-3 border-t text-xs text-gray-600">
              <span><span className="inline-block w-2 h-2 rounded bg-green-500 mr-1"></span>Safety</span>
              <span><span className="inline-block w-2 h-2 rounded bg-blue-500 mr-1"></span>Mileage</span>
              <span><span className="inline-block w-2 h-2 rounded bg-purple-500 mr-1"></span>Tech</span>
            </div>
          </div>
        </div>
        
        <div className="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-xl p-6 text-white">
          <h3 className="font-semibold mb-4">🎯 Key Strategic Insights from Reddit Data</h3>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {[
              { icon: 'shield', title: 'Safety: Maruti Leads', desc: 'Grand Vitara 96% vs Creta 14%' },
              { icon: 'fuel', title: 'Honda City Opportunity', desc: '3% mileage - target with Ciaz Hybrid' },
              { icon: 'cpu', title: 'Tech Gap Neutralized', desc: 'Zero difference with Hyundai now' }
            ].map(({ icon, title, desc }) => (
              <div key={title} className="bg-white/10 rounded-lg p-4">
                <Icon name={icon} className="w-5 h-5 mb-2" />
                <p className="font-semibold text-sm">{title}</p>
                <p className="text-xs text-white/80 mt-1">{desc}</p>
              </div>
            ))}
          </div>
        </div>
      </div>
    );

    // Chat View
    const ChatView = () => {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [aiStatus, setAiStatus] = useState({ checked: false, enabled: false });
      const messagesEndRef = useRef(null);

      useEffect(() => {
        fetch('/api/health')
          .then(r => r.json())
          .then(data => {
            setAiStatus({ checked: true, enabled: data.ai_enabled });
            setMessages([{
              role: 'assistant',
              content: `👋 **Welcome to Smaartbrand Auto AI**\n\nI've analyzed **${data.models_loaded || 27} car models** from Reddit r/CarsIndia.\n\n${data.ai_enabled ? '🟢 **Claude AI is ACTIVE**' : '🟡 **Rule-based mode** - Add ANTHROPIC_API_KEY for full AI'}\n\n**Try asking:**\n• "How do I beat Creta?"\n• "Tell me about Grand Vitara"\n• "Safety analysis"\n• "Conquest opportunities"`,
              isMarkdown: true
            }]);
          })
          .catch(() => {
            setMessages([{ role: 'assistant', content: '👋 Welcome! Ask me about Maruti or competitors.', isMarkdown: false }]);
          });
      }, []);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const handleSend = async (overrideInput) => {
        const query = overrideInput || input;
        if (!query.trim()) return;

        setMessages(prev => [...prev, { role: 'user', content: query }]);
        setInput('');
        setIsTyping(true);

        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query })
          });
          const data = await response.json();
          setMessages(prev => [...prev, {
            role: 'assistant',
            content: data.response,
            isMarkdown: true,
            aiPowered: data.ai_powered
          }]);
        } catch (error) {
          setMessages(prev => [...prev, {
            role: 'assistant',
            content: '❌ Error connecting to server. Please try again.',
            isMarkdown: false
          }]);
        }
        setIsTyping(false);
      };

      const suggestedQueries = ["How do I beat Creta?", "Tell me about Grand Vitara", "Safety analysis", "Conquest opportunities"];

      return (
        <div className="flex flex-col h-[calc(100vh-80px)]">
          {aiStatus.checked && (
            <div className={`px-4 py-2 text-center text-sm ${aiStatus.enabled ? 'bg-green-50 text-green-700' : 'bg-amber-50 text-amber-700'}`}>
              {aiStatus.enabled ? '🟢 Claude AI Active' : '🟡 Rule-based Mode - Add ANTHROPIC_API_KEY for full AI'}
            </div>
          )}

          <div className="flex-1 overflow-y-auto p-4 space-y-4">
            {messages.map((msg, i) => (
              <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-2xl rounded-2xl px-4 py-3 ${msg.role === 'user' ? 'bg-blue-600 text-white' : 'bg-white shadow border'}`}>
                  {msg.role === 'assistant' && (
                    <div className="flex items-center gap-2 mb-2 pb-2 border-b border-gray-100">
                      <Icon name="bot" className="w-4 h-4 text-blue-600" />
                      <span className="text-xs font-medium text-gray-500">DeciPro AI</span>
                      {msg.aiPowered && <span className="text-xs bg-green-100 text-green-700 px-1.5 py-0.5 rounded">AI</span>}
                    </div>
                  )}
                  {msg.role === 'user' ? (
                    <p className="text-sm">{msg.content}</p>
                  ) : msg.isMarkdown ? (
                    <div className="markdown-content text-sm text-gray-700" dangerouslySetInnerHTML={{ __html: marked.parse(msg.content) }} />
                  ) : (
                    <p className="text-sm text-gray-700">{msg.content}</p>
                  )}
                </div>
              </div>
            ))}
            {isTyping && (
              <div className="flex justify-start">
                <div className="bg-white rounded-2xl px-4 py-3 shadow border flex items-center gap-3">
                  <div className="flex gap-1">
                    <div className="w-2 h-2 bg-blue-500 rounded-full typing-dot"></div>
                    <div className="w-2 h-2 bg-blue-500 rounded-full typing-dot"></div>
                    <div className="w-2 h-2 bg-blue-500 rounded-full typing-dot"></div>
                  </div>
                  <span className="text-sm text-gray-500">Analyzing...</span>
                </div>
              </div>
            )}
            <div ref={messagesEndRef} />
          </div>

          {messages.length <= 1 && (
            <div className="px-4 pb-2">
              <div className="flex flex-wrap gap-2 justify-center">
                {suggestedQueries.map((q, i) => (
                  <button key={i} onClick={() => handleSend(q)} className="px-3 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 text-sm rounded-full transition-colors">
                    {q}
                  </button>
                ))}
              </div>
            </div>
          )}

          <div className="border-t bg-white p-4">
            <div className="flex gap-3 max-w-4xl mx-auto">
              <input
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyPress={(e) => e.key === 'Enter' && !isTyping && handleSend()}
                placeholder="Ask about any model, brand, or aspect..."
                className="flex-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                disabled={isTyping}
              />
              <button
                onClick={() => handleSend()}
                disabled={!input.trim() || isTyping}
                className="px-5 py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white rounded-xl transition-colors flex items-center gap-2"
              >
                <Icon name="send" className="w-4 h-4" />
              </button>
            </div>
          </div>
        </div>
      );
    };

    // Main App
    function App() {
      const [activeView, setActiveView] = useState('chat');

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50">
          <div className="bg-white border-b shadow-sm px-4 md:px-6 py-3">
            <div className="max-w-7xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center">
                  <Icon name="car" className="w-5 h-5 text-white" />
                </div>
                <div>
                  <h1 className="text-lg font-bold text-gray-900">Smaartbrand Auto</h1>
                  <p className="text-xs text-gray-500 hidden md:block">DeciPro DECIDE Engine • Maruti POC</p>
                </div>
              </div>

              <div className="flex items-center gap-2">
                <button
                  onClick={() => setActiveView('dashboard')}
                  className={`flex items-center gap-2 px-3 md:px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeView === 'dashboard' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                >
                  <Icon name="dashboard" className="w-4 h-4" />
                  <span className="hidden md:inline">Dashboard</span>
                </button>
                <button
                  onClick={() => setActiveView('chat')}
                  className={`flex items-center gap-2 px-3 md:px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeView === 'chat' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                >
                  <Icon name="message" className="w-4 h-4" />
                  <span className="hidden md:inline">AI Chat</span>
                </button>
              </div>

              <div className="text-right text-xs text-gray-500 hidden md:block">
                <p>Reddit r/CarsIndia</p>
                <p className="font-medium">27 models • Live Data</p>
              </div>
            </div>
          </div>

          <div className="max-w-7xl mx-auto">
            {activeView === 'dashboard' ? <DashboardView /> : <ChatView />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
